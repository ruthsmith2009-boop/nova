# Render Blueprint — deploys ARIA as a 24/7 web service.
# In Render: New → Blueprint → connect this repo. Render reads this file.
# Then add the secret values (API keys) in the dashboard — they are NOT in git.
services:
  - type: web
    name: aria-re
    runtime: python
    plan: starter            # ~$7/mo always-on. Use "free" to try (spins down when idle).
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    disk:
      name: aria-data        # persistent disk so the SQLite DB + PDFs survive redeploys
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////var/data/aria_re.db
      - key: PYTHON_VERSION
        value: "3.12.4"
      # ---- Secrets: set these in the Render dashboard (sync:false = not stored in git) ----
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: VAPI_API_KEY
        sync: false
      - key: VAPI_PHONE_NUMBER_ID
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: LEADGEN_WEBHOOK_TOKEN
        sync: false
      - key: ARIA_USERNAME
        sync: false
      - key: ARIA_PASSWORD
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false           # set to https://aria.divinerealtyteam.com once the domain is live
      - key: AGENT_NAME
        value: Ruth Smith
      - key: BROKER_NAME
        value: Divine Realty
      - key: AGENT_EMAIL
        value: ruthsmith2009@gmail.com
      - key: PRIMARY_MARKET
        value: Santa Clara County, California
